<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peer Evaluation — Teacher Setup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 740px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 14px; color: #666; margin-top: 4px; }
  .nav-links { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .nav-link { font-size: 13px; color: #378ADD; text-decoration: none; padding: 0.3rem 0.75rem; border: 1px solid #c5ddf5; border-radius: 99px; background: #f0f7ff; }
  .nav-link:hover { background: #daeeff; }
  .class-tabs-row { display: flex; align-items: center; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .class-tab { padding: 0.4rem 1rem; border-radius: 99px; font-size: 13px; font-weight: 500; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; transition: all 0.15s; }
  .class-tab:hover { border-color: #999; color: #333; }
  .class-tab.active { background: #1a1a1a; border-color: #1a1a1a; color: white; }
  .class-tab.danger { color: #c0392b; border-color: #f5c6c2; background: white; font-size: 12px; padding: 0.3rem 0.7rem; }
  .class-tab.danger:hover { background: #fff5f5; }
  .class-box { background: white; border: 1px solid #e0e0da; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .field-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  .field-label { font-size: 13px; color: #555; min-width: 80px; }
  input[type=text] { flex: 1; padding: 0.45rem 0.7rem; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fafafa; color: #1a1a1a; font-family: inherit; transition: border-color 0.15s; }
  input[type=text]:focus { outline: none; border-color: #378ADD; background: white; }
  .groups-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .group-card { background: white; border: 1px solid #e0e0da; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; }
  .group-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .group-name-input { font-size: 15px; font-weight: 600; border: none; background: transparent; flex: 1; padding: 0; color: #1a1a1a; font-family: inherit; }
  .group-name-input:focus { outline: none; border-bottom: 1px solid #378ADD; }
  .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1rem; }
  .link-row { display: flex; align-items: center; gap: 8px; background: #f5f5f0; border-radius: 8px; padding: 0.6rem 0.75rem; }
  .link-url { font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; }
  .btn { padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: 500; color: #333; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: #f5f5f0; border-color: #bbb; }
  .btn.primary { background: #1a1a1a; border-color: #1a1a1a; color: white; }
  .btn.primary:hover { background: #333; }
  .btn.danger { color: #c0392b; border-color: #f5c6c2; }
  .btn.danger:hover { background: #fff5f5; }
  .btn.small { padding: 0.3rem 0.7rem; font-size: 12px; }
  .btn.copy { background: #378ADD; border-color: #378ADD; color: white; font-size: 12px; padding: 0.3rem 0.7rem; white-space: nowrap; }
  .btn.copy:hover { background: #185FA5; }
  .bottom-bar { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e0e0da; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; font-size: 13px; padding: 0.6rem 1.25rem; border-radius: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Peer Evaluation — Teacher Setup</h1>
    <p>Configure your classes once per semester. Links are generated automatically for each group.</p>
  </header>

  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">View dashboard</a>
  </div>

  <div class="class-tabs-row" id="classTabs"></div>

  <div class="class-box">
    <div class="section-label">Class info</div>
    <div class="field-row"><div class="field-label">Class name</div><input type="text" id="className" oninput="updateClassName()"></div>
    <div class="field-row"><div class="field-label">Semester</div><input type="text" id="semester" oninput="updateSemester()"></div>
  </div>

  <div class="groups-header">
    <div class="section-label" style="margin:0;">Groups</div>
    <button class="btn small" onclick="addGroup()">+ Add group</button>
  </div>
  <div id="groups-container"></div>

  <div class="bottom-bar">
    <button class="btn danger small" onclick="deleteClass()">Delete this class</button>
    <button class="btn" onclick="exportConfig()">Export config</button>
    <button class="btn primary" onclick="saveAll()">Save all</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FORM_URL = window.location.origin + window.location.pathname.replace('index.html','') + 'form.html';

const DEFAULT = {
  classes: [
    { id: 'c1', className: 'TESP 78 / ENGL 62 — Section 1', semester: 'Winter 26', groups: [{ name: 'The Gummy Bears', students: ['Stefan','Elisa','Taylor','Sarah','Josie'] }] },
    { id: 'c2', className: 'TESP 78 / ENGL 62 — Section 2', semester: 'Winter 26', groups: [{ name: 'Group 1', students: ['','','','',''] }] },
  ],
  activeClass: 'c1'
};

let data;
try { data = JSON.parse(localStorage.getItem('peer_eval_config_v2')); if (!data) throw 0; } catch(e) { data = JSON.parse(JSON.stringify(DEFAULT)); }

function activeClass() { return data.classes.find(c => c.id === data.activeClass) || data.classes[0]; }
function encode(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function groupLink(g) {
  const cls = activeClass();
  return FORM_URL + '?g=' + encode({ className: cls.className, semester: cls.semester, classId: cls.id, groupName: g.name, students: g.students.filter(s=>s.trim()) });
}

function renderTabs() {
  document.getElementById('classTabs').innerHTML =
    data.classes.map(c =>
      `<div class="class-tab ${c.id===data.activeClass?'active':''}" onclick="switchClass('${c.id}')">${c.className}</div>`
    ).join('') +
    `<button class="btn small" onclick="addClass()" style="margin-left:4px;">+ Add class</button>`;
}

function renderForm() {
  const cls = activeClass();
  document.getElementById('className').value = cls.className;
  document.getElementById('semester').value = cls.semester;
  document.getElementById('groups-container').innerHTML = cls.groups.map((g, gi) => {
    const studentInputs = g.students.map((s,si) =>
      `<input type="text" value="${s}" placeholder="Student ${si+1}" oninput="updateStudent(${gi},${si},this.value)">`
    ).join('');
    return `
      <div class="group-card">
        <div class="group-card-header">
          <input class="group-name-input" type="text" value="${g.name}" placeholder="Group name" oninput="updateGroupName(${gi},this.value)">
          <button class="btn small danger" onclick="removeGroup(${gi})">Remove</button>
        </div>
        <div class="student-grid">${studentInputs}</div>
        <div class="link-row">
          <div class="link-url">${groupLink(g)}</div>
          <button class="btn copy" onclick="copyLink('${groupLink(g)}',this)">Copy link</button>
        </div>
      </div>`;
  }).join('');
}

function render() { renderTabs(); renderForm(); }

function switchClass(id) { data.activeClass = id; render(); }

function addClass() {
  const id = 'c' + Date.now();
  data.classes.push({ id, className: 'New Class', semester: activeClass().semester, groups: [{ name: 'Group 1', students: ['','','','',''] }] });
  data.activeClass = id;
  save(); render();
}

function deleteClass() {
  if (data.classes.length <= 1) { showToast('Cannot delete the only class.'); return; }
  if (!confirm(`Delete "${activeClass().className}"?`)) return;
  data.classes = data.classes.filter(c => c.id !== data.activeClass);
  data.activeClass = data.classes[0].id;
  save(); render();
}

function updateClassName() { activeClass().className = document.getElementById('className').value; renderTabs(); renderForm(); }
function updateSemester() { activeClass().semester = document.getElementById('semester').value; }
function updateGroupName(gi,val) { activeClass().groups[gi].name=val; renderForm(); }
function updateStudent(gi,si,val) { activeClass().groups[gi].students[si]=val; renderForm(); }
function addGroup() { activeClass().groups.push({ name:`Group ${activeClass().groups.length+1}`, students:['','','','',''] }); renderForm(); }
function removeGroup(i) { if(activeClass().groups.length>1){activeClass().groups.splice(i,1);renderForm();} }

function save() { try { localStorage.setItem('peer_eval_config_v2', JSON.stringify(data)); } catch(e){} }
function saveAll() { save(); showToast('Saved!'); }

function copyLink(link, btn) {
  navigator.clipboard.writeText(link).then(() => { btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy link',2000); });
}

function exportConfig() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = 'peer_eval_config.json';
  a.click();
  showToast('Exported!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

render();
</script>
</body>
</html>
