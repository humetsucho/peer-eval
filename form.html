<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peer Evaluation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .app { max-width: 640px; margin: 0 auto; }
  .progress-bar { height: 3px; background: #e0e0da; border-radius: 2px; margin-bottom: 1.75rem; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; transition: width 0.4s ease; }
  .step-dots { display: flex; gap: 5px; margin-bottom: 1.5rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #d0d0ca; transition: background 0.2s; }
  .dot.active { background: #1a1a1a; }
  .dot.done { background: #1D9E75; }
  .section-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .section-title { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.25rem; }
  .section-desc { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
  .anon-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #0F6E56; background: #e8f7f2; padding: 4px 12px; border-radius: 99px; margin-bottom: 1.25rem; border: 1px solid #9FE1CB; }
  .card { background: white; border: 1px solid #e0e0da; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; }
  .q-label { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.6rem; }
  .q-rubric { font-size: 12px; color: #777; margin-bottom: 1rem; line-height: 1.55; padding: 0.6rem 0.75rem; background: #f8f8f5; border-radius: 8px; border-left: 3px solid #e0e0da; }
  .scale { display: flex; align-items: center; gap: 6px; }
  .scale-end { font-size: 10px; color: #999; min-width: 52px; line-height: 1.3; }
  .scale-end.right { text-align: right; }
  .scale-btns { display: flex; gap: 6px; flex: 1; justify-content: center; }
  .scale-btn { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #e0e0da; background: white; font-size: 15px; font-weight: 600; color: #aaa; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .scale-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
  .scale-btn.sel { background: #1a1a1a; border-color: #1a1a1a; color: white; }
  .week-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
  .week-btn { padding: 0.6rem; border-radius: 8px; border: 1.5px solid #e0e0da; background: white; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; text-align: center; transition: all 0.15s; }
  .week-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
  .week-btn.sel { background: #1a1a1a; border-color: #1a1a1a; color: white; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn { padding: 0.6rem 1.25rem; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 14px; font-weight: 500; color: #333; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: #f5f5f0; }
  .btn.primary { background: #1a1a1a; border-color: #1a1a1a; color: white; }
  .btn.primary:hover { background: #333; }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .group-tag { display: inline-block; font-size: 12px; color: #185FA5; background: #e8f2fc; padding: 2px 10px; border-radius: 99px; margin-left: 8px; vertical-align: middle; border: 1px solid #B5D4F4; }
  .done-icon { width: 60px; height: 60px; border-radius: 50%; background: #e8f7f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 26px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwzSN1-lNOTnrN_6Zoy9sByT5Klt0yLjHDdVK_nbIXFhDDGjPaC2H_GXyfe7Vn06rPC/exec';

function decodeConfig(str) {
  try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; }
}

let config = (() => {
  try {
    const p = new URLSearchParams(window.location.search);
    const g = p.get('g');
    if (g) return decodeConfig(g);
  } catch(e) {}
  return { className:'TESP 78 / ENGL 62', semester:'Winter 26', groupName:'The Gummy Bears', students:['Stefan','Elisa','Taylor','Sarah','Josie'] };
})();

const CRITERIA = [
  { key:'contribution', label:'Contribution & Attitude', rubric:'Actively participates in discussions and tasks. Comes prepared with assigned reading, shows initiative, and maintains a positive, constructive attitude toward the group\'s work.' },
  { key:'cooperation', label:'Cooperation with others', rubric:'Listens respectfully to teammates, builds on others\' ideas, and supports group decisions. Avoids dominating or disengaging from group interactions.' },
  { key:'focus', label:'Focus & Commitment', rubric:'Stays on task during group sessions, meets deadlines, and completes assigned reading before class. Minimizes distractions for self and others.' },
  { key:'role', label:'Team role fulfillment', rubric:'Understands and carries out their assigned role effectively (e.g., facilitator, presenter). Adapts when needed to support the group.' },
  { key:'communicate', label:'Ability to communicate', rubric:'Expresses ideas clearly and respectfully. Asks questions when unsure, responds to others\' points, and keeps the conversation moving.' },
  { key:'accuracy', label:'Accuracy', rubric:'Demonstrates understanding of the assigned reading. References content correctly and avoids misrepresenting what was read.' },
];

function fresh() {
  const r = {};
  config.students.forEach(s => r[s] = {});
  return { step:0, week:null, collab:null, ratings:r, comment:'', submitting:false, error:'' };
}

let state = fresh();

function total() { return 1 + config.students.length + 2; }

function render() {
  const pct = Math.round((state.step / total()) * 100);
  const dots = Array.from({length:total()}, (_,i) =>
    `<div class="dot ${i<state.step?'done':i===state.step?'active':''}"></div>`
  ).join('');

  let html = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="step-dots">${dots}</div>`;

  const s = state.step;
  if (s === 0) html += renderWeek();
  else if (s >= 1 && s <= config.students.length) html += renderStudent(config.students[s-1], s);
  else if (s === config.students.length+1) html += renderCollab();
  else html += renderComments();

  document.getElementById('app').innerHTML = html;
}

function renderWeek() {
  const weeks = Array.from({length:10},(_,i) =>
    `<button class="week-btn ${state.week===i+1?'sel':''}" onclick="selectWeek(${i+1})">Week ${i+1}</button>`
  ).join('');
  return `
    <div class="section-label">Section 1 of ${total()}</div>
    <div class="section-title">Peer Evaluation <span class="group-tag">${config.groupName}</span></div>
    <div class="section-desc">${config.className} · ${config.semester}</div>
    <div class="anon-tag">Anonymous — your name will not be recorded</div>
    <div class="card">
      <div class="q-label">Which week are you evaluating?</div>
      <div class="week-grid">${weeks}</div>
    </div>
    <div class="nav"><span></span><button class="btn primary" onclick="go(1)" ${state.week?'':'disabled'}>Next →</button></div>`;
}

function renderStudent(name, step) {
  const cards = CRITERIA.map(c => {
    const val = state.ratings[name]?.[c.key];
    const btns = [1,2,3,4,5].map(n =>
      `<button class="scale-btn ${val===n?'sel':''}" onclick="setRating('${name}','${c.key}',${n})">${n}</button>`
    ).join('');
    return `<div class="card">
      <div class="q-label">${c.label}</div>
      <div class="q-rubric">${c.rubric}</div>
      <div class="scale">
        <div class="scale-end">Beginning<br>does not meet</div>
        <div class="scale-btns">${btns}</div>
        <div class="scale-end right">Advanced<br>exceeds</div>
      </div>
    </div>`;
  }).join('');
  const ok = CRITERIA.every(c => state.ratings[name]?.[c.key]);
  return `
    <div class="section-label">Section ${step+1} of ${total()} · ${config.groupName}</div>
    <div class="section-title">${name}</div>
    <div class="section-desc">Rate each dimension for ${name} this week.</div>
    ${cards}
    <div class="nav">
      <button class="btn" onclick="go(-1)">← Back</button>
      <button class="btn primary" onclick="go(1)" ${ok?'':'disabled'}>Next →</button>
    </div>`;
}

function renderCollab() {
  const btns = [1,2,3,4,5].map(n =>
    `<button class="scale-btn ${state.collab===n?'sel':''}" onclick="setCollab(${n})">${n}</button>`
  ).join('');
  return `
    <div class="section-label">Section ${config.students.length+2} of ${total()} · ${config.groupName}</div>
    <div class="section-title">Group Collaboration</div>
    <div class="section-desc">Now that you've evaluated each member, how would you rate the group's overall collaboration this week?</div>
    <div class="card">
      <div class="q-label">Overall group collaboration</div>
      <div class="scale">
        <div class="scale-end">Poor</div>
        <div class="scale-btns">${btns}</div>
        <div class="scale-end right">Excellent</div>
      </div>
    </div>
    <div class="nav">
      <button class="btn" onclick="go(-1)">← Back</button>
      <button class="btn primary" onclick="go(1)" ${state.collab?'':'disabled'}>Next →</button>
    </div>`;
}

function renderComments() {
  return `
    <div class="section-label">Section ${total()} of ${total()} · ${config.groupName}</div>
    <div class="section-title">Comments</div>
    <div class="section-desc">Any comments or communications for the instructor? (optional)</div>
    <div class="card">
      <textarea style="width:100%;min-height:90px;border:1px solid #ddd;border-radius:8px;padding:0.75rem;font-size:14px;font-family:inherit;color:#1a1a1a;background:white;resize:vertical;" placeholder="Leave a comment for your instructor..." oninput="state.comment=this.value">${state.comment}</textarea>
    </div>
    ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${state.submitting?'disabled':''}>← Back</button>
      <button class="btn primary" onclick="submit()" ${state.submitting?'disabled':''}>
        ${state.submitting?'<span class="spinner"></span>Submitting...':'Submit ✓'}
      </button>
    </div>`;
}

function renderDone() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:3rem 1rem;">
      <div class="done-icon">✓</div>
      <div style="font-size:24px;font-weight:600;margin-bottom:0.5rem;">Submitted!</div>
      <div style="font-size:14px;color:#666;margin-bottom:0.25rem;">${config.groupName} · Week ${state.week}</div>
      <div style="font-size:13px;color:#999;margin-bottom:2rem;">Thank you for your honest evaluation.</div>
      <button class="btn" onclick="again()">Submit another week →</button>
    </div>`;
}

async function submit() {
  state.submitting = true;
  state.error = '';
  render();

  const payload = {
    groupName: config.groupName,
    className: config.className,
    semester: config.semester,
    week: state.week,
    collab: state.collab,
    ratings: state.ratings,
    comment: state.comment,
  };

  try {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = 'hidden_iframe';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);

    const iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    document.body.appendChild(form);

    iframe.onload = () => {
      document.body.removeChild(form);
      document.body.removeChild(iframe);
    };

    form.submit();
    renderDone();
  } catch(e) {
    state.submitting = false;
    state.error = 'Could not submit. Please check your connection and try again.';
    render();
  }
}

function selectWeek(w) { state.week=w; render(); }
function setCollab(v) { state.collab=v; render(); }
function setRating(name,key,val) { if(!state.ratings[name]) state.ratings[name]={}; state.ratings[name][key]=val; render(); }
function go(dir) { state.step+=dir; render(); }
function again() { state=fresh(); render(); }

render();
</script>
</body>
</html>
